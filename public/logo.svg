<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 115" role="img" aria-label="Sunglow CNC Technics">
  <!-- Emblem mark: navy pieces drawn first, red on top -->

  <!-- Navy lower-left angular piece -->
  <polygon points="8,54 34,38 42,67 20,80" fill="#1C2B5E"/>

  <!-- Navy lower-right larger piece -->
  <polygon points="78,52 104,26 98,84 66,84" fill="#1C2B5E"/>

  <!-- Red main upper blade (painted over navy for overlap effect) -->
  <polygon points="4,5 66,5 104,26 80,52 36,48 4,36" fill="#C8202E"/>

  <!-- Red small center accent (between navy pieces) -->
  <polygon points="38,54 68,42 68,64 42,74" fill="#C8202E"/>

  <!-- SUNGLOW CNC — large bold navy, left-aligned -->
  <text x="118" y="46"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="900" fill="#1C2B5E"
    text-anchor="start" letter-spacing="1">SUNGLOW CNC</text>

  <!-- Red horizontal separator line -->
  <rect x="118" y="54" width="440" height="4" fill="#C8202E"/>

  <!-- Technics — bold navy, right-aligned -->
  <text x="558" y="84"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="25" font-weight="700" fill="#1C2B5E"
    text-anchor="end">Technics</text>

  <!-- Thin dark separator line -->
  <rect x="118" y="92" width="440" height="2" fill="#1C2B5E"/>

  <!-- CNC MILLING WORKS — spaced, centered -->
  <text x="338" y="110"
    font-family="Arial,Helvetica,sans-serif"
    font-size="14" font-weight="700" fill="#1C2B5E"
    text-anchor="middle" letter-spacing="5">CNC MILLING WORKS</text>
</svg>
