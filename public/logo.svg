<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="Sunglow CNC Technics">

  <!-- ═══ EMBLEM MARK ═══ -->

  <!-- NAVY lower-left elongated parallelogram bar (behind red) -->
  <polygon points="6,72 38,52 46,78 14,96" fill="#1C2B5E"/>

  <!-- NAVY lower-right elongated parallelogram bar -->
  <polygon points="50,46 96,68 84,108 40,104" fill="#1C2B5E"/>

  <!-- RED main wing: single sharp left tip, sweeps right, two-dip bottom -->
  <polygon points="0,52 16,14 86,5 124,38 96,64 64,36 34,58" fill="#C8202E"/>

  <!-- RED small centre accent between the two navy bars -->
  <polygon points="38,74 62,64 64,84 42,93" fill="#C8202E"/>

  <!-- ═══ TEXT BLOCK ═══ -->

  <!-- SUNGLOW CNC — heavy bold navy -->
  <text x="136" y="46"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="36" font-weight="900" fill="#1C2B5E"
    text-anchor="start" letter-spacing="1">SUNGLOW CNC</text>

  <!-- Red horizontal separator line -->
  <rect x="136" y="54" width="422" height="4" fill="#C8202E"/>

  <!-- Technics — bold, right-aligned -->
  <text x="558" y="84"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="25" font-weight="700" fill="#1C2B5E"
    text-anchor="end">Technics</text>

  <!-- Thin navy separator line -->
  <rect x="136" y="93" width="422" height="2" fill="#1C2B5E"/>

  <!-- CNC MILLING WORKS — letter-spaced, centred -->
  <text x="347" y="111"
    font-family="Arial,Helvetica,sans-serif"
    font-size="13" font-weight="700" fill="#1C2B5E"
    text-anchor="middle" letter-spacing="5">CNC MILLING WORKS</text>

</svg>
