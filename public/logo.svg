<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" role="img" aria-label="Sunglow CNC Technics">
  <!-- Emblem mark - stylized CNC tool cross -->
  <!-- Red upper blade/arrow shape -->
  <polygon points="15,5 87,5 110,32 87,52 58,20 30,52 8,28" fill="#C8202E"/>
  <!-- Navy lower-left angular shape -->
  <polygon points="12,42 30,58 15,90 0,68" fill="#1C2B5E"/>
  <!-- Navy lower-right angular shape -->
  <polygon points="87,55 110,32 93,92 66,92" fill="#1C2B5E"/>
  <!-- Red center accent diamond -->
  <polygon points="48,60 67,46 67,66 49,78" fill="#C8202E" opacity="0.88"/>

  <!-- Text: SUNGLOW CNC -->
  <text x="128" y="52" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="900" fill="#1C2B5E" letter-spacing="1">SUNGLOW CNC</text>

  <!-- Red separator line -->
  <rect x="128" y="60" width="430" height="4" fill="#C8202E"/>

  <!-- Text: Technics (right-aligned, below red line) -->
  <text x="325" y="90" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="700" fill="#1C2B5E">Technics</text>

  <!-- Black thin separator line -->
  <rect x="128" y="98" width="430" height="2" fill="#1C2B5E"/>

  <!-- Text: CNC MILLING WORKS -->
  <text x="173" y="118" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#1C2B5E" letter-spacing="4">CNC MILLING WORKS</text>
</svg>
