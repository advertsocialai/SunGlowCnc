<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="Sunglow CNC Technics">

  <!-- ═══ ICON MARK ═══ -->

  <!-- RED main shape: wide horizontal arm + angled downward stem (angular T/arrow) -->
  <!-- Horizontal arm -->
  <polygon points="0,20 65,10 72,32 44,36 44,30 0,28" fill="#C8202E"/>
  <!-- Diagonal stem (connects downward from arm) -->
  <polygon points="40,32 72,32 76,60 54,64 50,48 44,36" fill="#C8202E"/>

  <!-- RED small accent arrow (lower-right) -->
  <polygon points="53,67 72,61 67,80" fill="#C8202E"/>

  <!-- NAVY bar upper-right (short diagonal rectangle) -->
  <polygon points="82,14 106,8 108,26 84,32" fill="#1C2B5E"/>

  <!-- NAVY bar lower-right (short diagonal rectangle) -->
  <polygon points="79,56 103,50 105,68 81,74" fill="#1C2B5E"/>

  <!-- NAVY oval dot (centre accent) -->
  <ellipse cx="47" cy="68" rx="7" ry="5" fill="#1C2B5E"/>

  <!-- ═══ TEXT BLOCK ═══ -->

  <!-- SUNGLOW CNC -->
  <text x="136" y="46"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="36" font-weight="900" fill="#1C2B5E"
    text-anchor="start" letter-spacing="1">SUNGLOW CNC</text>

  <!-- Red separator line -->
  <rect x="136" y="54" width="422" height="4" fill="#C8202E"/>

  <!-- Technics -->
  <text x="558" y="84"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="25" font-weight="700" fill="#1C2B5E"
    text-anchor="end">Technics</text>

  <!-- Navy bottom line -->
  <rect x="136" y="93" width="422" height="2" fill="#1C2B5E"/>

  <!-- CNC MILLING WORKS -->
  <text x="347" y="111"
    font-family="Arial,Helvetica,sans-serif"
    font-size="13" font-weight="700" fill="#1C2B5E"
    text-anchor="middle" letter-spacing="5">CNC MILLING WORKS</text>

</svg>
